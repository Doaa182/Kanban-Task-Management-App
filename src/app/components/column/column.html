<div class="column w-72 flex flex-col">
  <div class="flex items-center gap-3 mb-4">
    <span class="w-3 h-3 rounded-full" [style.background-color]="getColumnColor()"></span>

    <h3 class="text-xs text-[#828fa3] uppercase">
      {{ column().name }} ({{ column().tasks.length }})
    </h3>
  </div>

  <div class="flex flex-col gap-4">
    @if (column().tasks.length === 0) {
      <div
        class="border border-dashed border-[#3E3F4E] rounded-lg p-4 text-center text-[#828fa3]"
        (click)="taskService.openAddTaskModal()"
      >
        No tasks yet
      </div>
    } @else {
      @for (task of column().tasks; track task.id) {
        <!-- <app-task-card [task]="task" (taskClicked)="onTaskClick($event)" /> -->
        <app-task-card [taskId]="task.id" (taskClicked)="onTaskClick($event)" />
      }
    }
  </div>
</div>
