<div class="fixed inset-0 bg-black/60 flex items-center justify-center z-50" (click)="close()">
  <div
    class="w-[400px] rounded-lg p-6 space-y-5 dark:bg-dark-gray bg-white dark:text-white text-mostly-black"
    (click)="$event.stopPropagation()"
  >
    <h2 class="text-xl font-bold">Add New Column</h2>

    <form [formGroup]="form" (ngSubmit)="submit()" class="space-y-4 dark:text-white text-dark-gray">
      <div>
        <label class="text-xs text-gray">Column Name</label>

        <input
          type="text"
          formControlName="name"
          class="w-full mt-1 p-2 rounded dark:bg-charcoal bg-white border border-medium-gray"
        />

        @if (form.controls.name.touched) {
          @if (form.controls.name.errors?.['required']) {
            <p class="text-red text-xs mt-1">Column name is required</p>
          }

          @if (form.controls.name.errors?.['duplicate']) {
            <p class="text-red text-xs mt-1">Column name already exists</p>
          }
        }
      </div>

      <div class="flex justify-end gap-2 pt-4">
        <button
          type="button"
          (click)="close()"
          class="px-4 py-2 rounded cursor-pointer text-purple dark:text-light-lavender bg-light-lavender hover:bg-lavender dark:bg-medium-gray hover:dark:bg-gray transition-all"
        >
          Cancel
        </button>

        <button
          type="submit"
          class="px-4 py-2 rounded cursor-pointer disabled:opacity-50 disabled:cursor-not-allowed text-light-lavender bg-purple hover:bg-light-purple transition-all"
          [disabled]="form.invalid"
        >
          Add Column
        </button>
      </div>
    </form>
  </div>
</div>
