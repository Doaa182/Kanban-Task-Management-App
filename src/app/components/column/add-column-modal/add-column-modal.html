<div class="fixed inset-0 bg-black/60 flex items-center justify-center z-50" (click)="close()">
  <div
    class="w-[400px] rounded-lg p-6 space-y-5 dark:bg-surface-dark bg-surface dark:text-surface text-darkest"
    (click)="$event.stopPropagation()"
  >
    <h2 class="text-xl font-bold">Add New Column</h2>

    <form
      [formGroup]="form"
      (ngSubmit)="submit()"
      class="space-y-4 dark:text-surface text-surface-dark"
    >
      <div>
        <label class="text-xs text-foreground">Column Name</label>

        <input
          type="text"
          formControlName="name"
          class="w-full mt-1 p-2 rounded dark:bg-dark bg-surface border border-border-dark"
        />

        @if (form.controls.name.touched) {
          @if (form.controls.name.errors?.['required']) {
            <p class="text-error text-xs mt-1">Column name is required</p>
          }

          @if (form.controls.name.errors?.['duplicate']) {
            <p class="text-error text-xs mt-1">Column name already exists</p>
          }
        }
      </div>

      <div class="flex justify-end gap-2 pt-4">
        <button
          type="button"
          (click)="close()"
          class="px-4 py-2 rounded cursor-pointer text-primary dark:text-secondary-light bg-secondary-light dark:bg-border-dark"
        >
          Cancel
        </button>

        <button
          type="submit"
          class="px-4 py-2 rounded cursor-pointer disabled:opacity-50 disabled:cursor-not-allowed text-secondary-light bg-primary"
          [disabled]="form.invalid"
        >
          Add Column
        </button>
      </div>
    </form>
  </div>
</div>
