<div class="fixed inset-0 bg-black/50 flex items-center justify-center" (click)="closeTaskModal()">
  <div
    class="w-96 p-6 rounded-lg dark:bg-surface-dark bg-surface dark:text-surface text-darkest"
    (click)="$event.stopPropagation(); uiService.closeTaskMenu()"
  >
    <div class="flex justify-between items-center">
      <h2 class="text-lg font-bold">{{ task.title }}</h2>

      <div class="relative shrink-0">
        <button
          class="cursor-pointer p-2 rounded-sm transition-all dark:hover:bg-border-dark hover:bg-background"
          (click)="uiService.toggleTaskMenu($event)"
        >
          <img src="assets/icon-vertical-ellipsis.svg" alt="vertical-ellipsis-icon" />
        </button>

        @if (uiService.isTaskMenuOpen()) {
          <div
            class="absolute right-0 mt-2 w-32 dark:bg-surface-dark bg-surface rounded shadow-lg z-50"
          >
            <button
              class="w-full text-left px-3 py-2 text-sm cursor-pointer dark:hover:bg-border-dark hover:bg-background text-foreground"
              (click)="taskService.openEditTaskModal(task.id)"
            >
              Edit Task
            </button>

            <button
              class="w-full text-left px-3 py-2 hover:bg-error/20 text-sm text-error cursor-pointer"
              (click)="deleteTaskById(task.id)"
            >
              Delete Task
            </button>
          </div>
        }
      </div>
    </div>

    <p class="text-foreground mt-3 text-sm">
      {{ task.description }}
    </p>

    <div class="mt-6">
      <h3 class="text-xs text-foreground">
        Subtasks ({{ task.subtasks.filter((s) => s.isCompleted).length }} of
        {{ task.subtasks.length }})
      </h3>

      <div class="mt-3 flex flex-col gap-2">
        @for (subtask of task.subtasks; track subtask.id) {
          <label class="flex items-center gap-2 text-sm">
            <input
              type="checkbox"
              [checked]="subtask.isCompleted"
              (change)="toggleSubtask(task.id, subtask.id)"
            />

            <span
              [ngClass]="{
                'line-through text-foreground': subtask.isCompleted,
              }"
            >
              {{ subtask.title }}
            </span>
          </label>
        }
      </div>
    </div>

    <div class="mt-6">
      <h3 class="text-xs text-foreground mb-2">Current Status</h3>

      <select
        class="w-full p-2 rounded dark:bg-dark bg-surface border border-border-dark"
        (change)="onTaskStatusSelectionChange($event, task.id)"
      >
        @for (column of kanbanService.activeBoardSignal().columns; track column.id) {
          <option [value]="column.name" [selected]="column.name === task.status">
            {{ column.name }}
          </option>
        }
      </select>
    </div>
  </div>
</div>
