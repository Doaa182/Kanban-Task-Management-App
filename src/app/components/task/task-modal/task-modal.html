<div class="fixed inset-0 bg-black/60 flex items-center justify-center" (click)="closeTaskModal()">
  <div
    class="w-full md:w-10/12 lg:w-1/3 p-6 rounded-lg dark:bg-dark-gray bg-white dark:text-white text-mostly-black"
    (click)="$event.stopPropagation(); uiService.closeTaskMenu()"
  >
    <div class="flex justify-between items-center">
      <h2 class="text-lg font-bold">{{ task.title }}</h2>

      <div class="relative shrink-0">
        <button
          class="cursor-pointer p-2 rounded-sm transition-all dark:hover:bg-medium-gray hover:bg-off-white"
          (click)="uiService.toggleTaskMenu($event)"
        >
          <img src="assets/icon-vertical-ellipsis.svg" alt="vertical-ellipsis-icon" />
        </button>

        @if (uiService.isTaskMenuOpen()) {
          <div
            class="absolute right-0 mt-2 w-32 dark:bg-dark-gray bg-white rounded z-50 border-2 border-light-gray dark:border-medium-gray border-b-purple dark:border-b-purple"
          >
            <button
              class="w-full text-left px-3 py-2 text-sm cursor-pointer dark:hover:bg-medium-gray hover:bg-off-white text-gray transition-all"
              (click)="taskService.openEditTaskModal(task.id)"
            >
              Edit Task
            </button>

            <button
              class="w-full text-left px-3 py-2 hover:bg-red/20 text-sm text-red cursor-pointer transition-all"
              (click)="deleteTaskById(task.id)"
            >
              Delete Task
            </button>
          </div>
        }
      </div>
    </div>

    <p class="text-gray mt-3 text-sm">
      {{ task.description }}
    </p>

    <div class="mt-6">
      <h3 class="text-xs text-gray">
        Subtasks ({{ task.subtasks.filter((s) => s.isCompleted).length }} of
        {{ task.subtasks.length }})
      </h3>

      <div class="mt-3 flex flex-col gap-2">
        @for (subtask of task.subtasks; track subtask.id) {
          <label class="flex items-center gap-2 text-sm">
            <input
              type="checkbox"
              [checked]="subtask.isCompleted"
              (change)="toggleSubtask(task.id, subtask.id)"
            />

            <span
              [ngClass]="{
                'line-through text-gray': subtask.isCompleted,
              }"
            >
              {{ subtask.title }}
            </span>
          </label>
        }
      </div>
    </div>

    <div class="mt-6">
      <h3 class="text-xs text-gray mb-2">Current Status</h3>

      <select
        class="w-full p-2 rounded dark:bg-charcoal bg-white border border-medium-gray"
        (change)="onTaskStatusSelectionChange($event, task.id)"
      >
        @for (column of kanbanService.activeBoardSignal().columns; track column.id) {
          <option [value]="column.name" [selected]="column.name === task.status">
            {{ column.name }}
          </option>
        }
      </select>
    </div>
  </div>
</div>
