<div class="task-card rounded-lg cursor-pointer py-5 px-4 bg-[#2b2c37]">
  <h4 class="text-white hover:text-[#635FC7] transition-all font-bold text-sm">
    {{ taskSignal()?.title }}
  </h4>

  <p class="text-[#828fa3] mt-2 font-bold text-xs">
    {{ completedSubtasks() }}
    of
    {{ taskSignal()?.subtasks?.length }}
    subtasks
  </p>
</div>
