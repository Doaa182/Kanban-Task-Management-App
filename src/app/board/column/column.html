<div class="column bg-[#20212C] p-2 w-72 flex flex-col">
  <div class="flex items-center gap-3 mb-6">
    <span class="w-4 h-4 bg-[#8471F2] rounded-full"></span>
    <h3 class="text-[#828fa3] text-xs tracking-widest font-bold uppercase">
      {{ column.name }} ({{ column.tasks.length }})
    </h3>
  </div>

  <div class="mt-4 flex flex-col gap-5 overflow-y-auto overflow-x-hidden pr-2">
    @if (column.tasks.length === 0) {
      <p class="text-[#828fa3] text-sm">No tasks</p>
    }

    @for (task of column.tasks; track task.id) {
      <app-task-card [task]="task"></app-task-card>
    }
  </div>
</div>
