<aside class="sidebar bg-red-600">
  <h2>All Boards ({{ service.boards().length }})</h2>

  <ul>
    @for (board of service.boards(); track board.id) {
      <li (click)="selectBoard(board.id)">
        {{ board.name }}
      </li>
    }
  </ul>
</aside>
